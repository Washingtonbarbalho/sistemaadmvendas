<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Integrado - App</title>
    
    <!-- Configurações PWA -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestão App">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel para JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { 
            display: none; 
        }
        .no-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

        @keyframes fade-in { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .animate-fade-in { 
            animation: fade-in 0.3s ease-out forwards; 
        }

        input[type="date"] { 
            min-height: 48px; 
        }

        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }

        body {
            background-color: #f1f5f9;
            color: #1e293b;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 antialiased selection:bg-yellow-200 selection:text-yellow-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Package, Users, PlusCircle, Search, Edit2, Trash2, X, Tag, User,
            Phone, FileText, MapPin, Store, Lock, AlertTriangle, ChevronRight,
            ChevronLeft, MoreHorizontal, LayoutGrid, ArrowDownCircle, ArrowUpCircle,
            History, Info, LogOut, CheckCircle, Clock
        } from 'https://esm.sh/lucide-react@0.292.0';

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, deleteDoc, onSnapshot, query, serverTimestamp, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDQQcD2tzsVS8Xzy-GpHT897kB7EC-S8Ng",
            authDomain: "vendas-aura.firebaseapp.com",
            projectId: "vendas-aura",
            storageBucket: "vendas-aura.firebasestorage.app",
            messagingSenderId: "767983700810",
            appId: "1:767983700810:web:947c8713bd23fb8a078fb3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = 'vendas-aura-main';

        // --- HELPERS ---
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val || 0);

        const parseMoney = (valStr) => {
            if (!valStr) return 0;
            if (typeof valStr === 'number') return valStr;
            const clean = valStr.replace(/\./g, '').replace(',', '.');
            return parseFloat(clean) || 0;
        };

        const maskMoney = (value) => {
            if(value === undefined || value === null) return "0,00";
            let v = String(value).replace(/\D/g, "");
            v = (v / 100).toFixed(2) + "";
            v = v.replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            return v;
        };

        const maskPhone = (v) => {
            v = v.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            return v;
        };

        const maskCpfCnpj = (v) => {
            v = v.replace(/\D/g, "");
            if (v.length <= 11) {
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                v = v.replace(/^(\d{2})(\d)/, "$1.$2");
                v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
                v = v.replace(/(\d{4})(\d)/, "$1-$2");
            }
            return v;
        };

        const maskCep = (v) => {
            v = v.replace(/\D/g, "");
            v = v.replace(/^(\d{5})(\d)/, "$1-$2");
            return v.slice(0, 9);
        };

        const formatDateTime = (dateStr) => {
            if (!dateStr) return '--/--/---- --:--';
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR') + ' ' + date.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        };

        const getBrazilDateString = () => {
            const date = new Date();
            return date.toLocaleDateString('pt-BR', { year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'America/Sao_Paulo' }).split('/').reverse().join('-');
        };

        // --- UI COMPONENTS ---
        const MoneyInput = ({ value, onChange, placeholder, className, disabled }) => {
            const [display, setDisplay] = useState(typeof value === 'number' ? maskMoney((value * 100).toFixed(0)) : value);
            
            useEffect(() => { 
                if (typeof value === 'number') {
                    setDisplay(maskMoney((value * 100).toFixed(0))); 
                } else if (typeof value === 'string') {
                    setDisplay(value);
                }
            }, [value]);

            const handleChange = (e) => { const m = maskMoney(e.target.value); setDisplay(m); onChange(m); };
            return (
                <div className="relative w-full">
                    <span className={`absolute left-3 top-3 font-bold ${disabled ? 'text-slate-300' : 'text-slate-400'}`}>R$</span>
                    <input type="text" inputMode="numeric" disabled={disabled} className={className} placeholder={placeholder || "0,00"} value={display} onChange={handleChange} />
                </div>
            );
        };

        const Pagination = ({ totalItems, itemsPerPage, currentPage, onPageChange }) => {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            if (totalPages <= 1) return null;

            const renderPageNumbers = () => {
                const pages = [];
                if (totalPages <= 7) {
                    for (let i = 1; i <= totalPages; i++) pages.push(i);
                } else {
                    if (currentPage <= 4) {
                        pages.push(1, 2, 3, 4, 5, '...', totalPages);
                    } else if (currentPage >= totalPages - 3) {
                        pages.push(1, '...', totalPages - 4, totalPages - 3, totalPages - 2, totalPages - 1, totalPages);
                    } else {
                        pages.push(1, '...', currentPage - 1, currentPage, currentPage + 1, '...', totalPages);
                    }
                }
                return pages;
            };

            return (
                <div className="flex justify-center items-center gap-2 mt-6 py-2 select-none">
                    <button onClick={() => onPageChange(currentPage - 1)} disabled={currentPage === 1} className="p-2 rounded-lg hover:bg-slate-200 text-slate-500 disabled:opacity-30 disabled:hover:bg-transparent">
                        <ChevronLeft size={20} />
                    </button>
                    {renderPageNumbers().map((page, index) => {
                        if (page === '...') return <span key={`ellipsis-${index}`} className="w-8 h-8 flex items-center justify-center text-slate-400"><MoreHorizontal size={16} /></span>;
                        return (
                            <button key={page} onClick={() => onPageChange(page)} className={`w-8 h-8 flex items-center justify-center rounded-lg font-bold text-sm transition-colors ${currentPage === page ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:bg-white hover:shadow-sm border border-transparent hover:border-slate-100'}`}>
                                {page}
                            </button>
                        );
                    })}
                    <button onClick={() => onPageChange(currentPage + 1)} disabled={currentPage === totalPages} className="p-2 rounded-lg hover:bg-slate-200 text-slate-500 disabled:opacity-30 disabled:hover:bg-transparent">
                        <ChevronRight size={20} />
                    </button>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, onClose, onConfirm, title, message }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[90] backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl animate-fade-in text-center flex flex-col">
                        <div className="mx-auto w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mb-4 shrink-0"> 
                            <AlertTriangle className="text-red-500" />
                        </div>
                        <h3 className="text-lg font-bold text-slate-800 mb-2 shrink-0">{title}</h3>
                        <p className="text-slate-500 mb-6 shrink-0 text-sm">{message}</p>
                        
                        <div className="flex gap-3 shrink-0">
                            <button onClick={onClose} className="flex-1 p-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">Voltar</button>
                            <button onClick={onConfirm} className="flex-1 p-3 text-white bg-red-500 hover:bg-red-600 font-bold rounded-xl shadow-lg shadow-red-200">Sim, Excluir</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- AUTH ---
        const AuthScreen = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async () => {
                if (!email || !password) return setError("Preencha todos os campos.");
                setLoading(true); setError('');
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                } catch (e) {
                    setError("Usuário ou senha incorretos.");
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-yellow-400 to-yellow-600">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md animate-fade-in">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Package className="text-yellow-400" size={32} />
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800">Gestor de Cadastros</h1>
                            <p className="text-slate-400 text-sm">Acesse com sua conta do sistema</p>
                        </div>
                        {error && <div className="bg-red-50 text-red-500 p-3 rounded-xl text-sm mb-4 flex items-center gap-2"><AlertTriangle size={16}/>{error}</div>}
                        <div className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">E-mail</label>
                                <div className="relative">
                                    <User className="absolute left-3 top-3 text-slate-400" size={20} />
                                    <input type="email" className="w-full p-3 pl-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="seu@email.com" value={email} onChange={e => setEmail(e.target.value)} />
                                </div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-slate-500 uppercase mb-1 ml-1">Senha</label>
                                <div className="relative">
                                    <Lock className="absolute left-3 top-3 text-slate-400" size={20} />
                                    <input type="password" className="w-full p-3 pl-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none" placeholder="••••••••" value={password} onChange={e => setPassword(e.target.value)} />
                                </div>
                            </div>
                            <button onClick={handleLogin} disabled={loading} className="w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 shadow-lg transition-colors disabled:opacity-50 mt-2">
                                {loading ? "Entrando..." : "Acessar Sistema"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MODAIS DE CADASTRO E MOVIMENTAÇÃO ---

        const StockMovementModal = ({ isOpen, onClose, product, onSave }) => {
            const [type, setType] = useState('compra');
            const [quantity, setQuantity] = useState('');
            const [unitCost, setUnitCost] = useState('');
            const [notes, setNotes] = useState('');

            useEffect(() => {
                if (isOpen && product) {
                    setType('compra'); setQuantity(''); setNotes('');
                    setUnitCost(maskMoney((product.costPrice * 100).toFixed(0)));
                }
            }, [isOpen, product]);

            const handleSubmit = () => {
                const qtyVal = parseInt(quantity) || 0;
                if (qtyVal <= 0) return alert("Insira uma quantidade válida maior que zero.");
                
                const costVal = parseMoney(unitCost);
                if (type === 'compra' && costVal <= 0) return alert("Para compras, insira o valor unitário pago na mercadoria.");

                onSave(product.id, { type, quantity: qtyVal, unitCost: costVal, notes });
            };

            const isEntry = ['compra', 'ajuste_entrada', 'devolucao'].includes(type);

            if (!isOpen || !product) return null;

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[80] backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-sm shadow-2xl animate-fade-in flex flex-col">
                        <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-2xl">
                            <h3 className="font-bold text-lg text-slate-800 flex items-center gap-2"><ArrowUpCircle className="text-yellow-600" size={20}/> Movimentar Estoque</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full"><X size={20} /></button>
                        </div>
                        <div className="p-5 space-y-4">
                            <div className="bg-slate-100 p-3 rounded-xl border border-slate-200 flex justify-between items-center">
                                <div>
                                    <p className="text-xs font-bold text-slate-500 uppercase line-clamp-1">{product.name}</p>
                                    <p className="text-[10px] text-slate-400 font-mono">Cód: #{product.code}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] text-slate-400 uppercase font-bold">Estoque Atual</p>
                                    <p className="font-bold text-slate-800">{product.quantity} un.</p>
                                </div>
                            </div>

                            <div>
                                <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Tipo de Movimentação *</label>
                                <select className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-yellow-500 bg-white" value={type} onChange={e => setType(e.target.value)}>
                                    <optgroup label="Entradas (Soma Estoque)">
                                        <option value="compra">Compra de Mercadoria</option>
                                        <option value="ajuste_entrada">Ajuste de Entrada (+)</option>
                                        <option value="devolucao">Devolução de Cliente</option>
                                    </optgroup>
                                    <optgroup label="Saídas (Subtrai Estoque)">
                                        <option value="ajuste_saida">Ajuste de Saída (-)</option>
                                        <option value="avaria">Avaria / Perda / Vencido</option>
                                    </optgroup>
                                </select>
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Qtd *</label>
                                    <input type="number" min="1" className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-yellow-500 text-center font-bold" value={quantity} onChange={e => setQuantity(e.target.value)} placeholder="0" />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Custo Unitário (R$)</label>
                                    <MoneyInput value={unitCost} onChange={setUnitCost} disabled={!isEntry} className={`w-full p-3 pl-8 border border-slate-200 rounded-lg outline-none font-bold text-sm ${isEntry ? 'focus:ring-2 focus:ring-yellow-500 bg-white' : 'bg-slate-100 text-slate-400'}`} />
                                </div>
                            </div>

                            {type === 'compra' && (
                                <div className="bg-yellow-50 p-3 rounded-lg border border-yellow-200 text-[10px] text-yellow-800 leading-tight">
                                    <span className="font-bold block mb-1">Cálculo de Custo Médio Ativo!</span>
                                    Ao registrar uma compra, o sistema unirá o valor atual do estoque com o valor desta nova compra e calculará automaticamente o novo custo base do produto.
                                </div>
                            )}

                            <div>
                                <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">Observações (Opcional)</label>
                                <input type="text" className="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-2 focus:ring-yellow-500 text-sm" value={notes} onChange={e => setNotes(e.target.value)} placeholder="NFe, motivo..." />
                            </div>

                        </div>
                        <div className="p-4 border-t border-slate-100 flex gap-3 bg-white rounded-b-2xl">
                            <button onClick={onClose} className="flex-1 p-3 text-slate-500 font-bold bg-slate-100 rounded-xl hover:bg-slate-200">Cancelar</button>
                            <button onClick={handleSubmit} className={`flex-1 p-3 text-white font-bold rounded-xl shadow-lg ${isEntry ? 'bg-emerald-500 hover:bg-emerald-600 shadow-emerald-200' : 'bg-red-500 hover:bg-red-600 shadow-red-200'}`}>Confirmar {isEntry ? 'Entrada' : 'Saída'}</button>
                        </div>
                    </div>
                </div>
            );
        };

        const ProductDetailsModal = ({ isOpen, onClose, product, salesHistory, onEdit, onMovementRequest, onDeleteRequest }) => {
            const [tab, setTab] = useState('info');

            const combinedHistory = useMemo(() => {
                let history = [];
                if (!product) return history;

                // 1. Manuais
                if (product.movements && Array.isArray(product.movements)) {
                    product.movements.forEach(m => {
                        history.push({
                            id: m.id,
                            date: m.date,
                            type: m.type,
                            qty: m.quantity,
                            isEntry: ['compra', 'ajuste_entrada', 'devolucao'].includes(m.type),
                            totalValue: m.quantity * (m.unitCost || 0),
                            notes: m.notes
                        });
                    });
                }
                
                // 2. Automáticos (Vendas)
                if (salesHistory && Array.isArray(salesHistory)) {
                    salesHistory.forEach(sale => {
                        const itemMatch = sale.items?.find(i => i.productId === product.id);
                        if (itemMatch) {
                            // Tenta pegar o preço do histórico da venda, senão pega o atual
                            const salePriceItem = itemMatch.price !== undefined ? itemMatch.price : product.salePrice;
                            
                            history.push({
                                id: `sale-${sale.id}`,
                                date: sale.saleDate + 'T12:00:00.000Z',
                                type: 'venda',
                                qty: itemMatch.quantity,
                                isEntry: false,
                                totalValue: itemMatch.quantity * salePriceItem,
                                notes: `Venda p/ ${sale.customerName?.split(' ')[0]}`
                            });

                            if (sale.status === 'canceled') {
                                history.push({
                                    id: `cancel-${sale.id}`,
                                    date: sale.canceledAt ? new Date(sale.canceledAt.seconds * 1000).toISOString() : sale.saleDate + 'T12:00:01.000Z',
                                    type: 'cancelamento',
                                    qty: itemMatch.quantity,
                                    isEntry: true,
                                    totalValue: itemMatch.quantity * salePriceItem,
                                    notes: `Venda Cancelada`
                                });
                            }
                        }
                    });
                }
                return history.sort((a, b) => new Date(b.date) - new Date(a.date));
            }, [product, salesHistory]);

            if (!isOpen || !product) return null;

            const isPromoActive = product.isPromo && getBrazilDateString() >= product.promoStart && getBrazilDateString() <= product.promoEnd;

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[60] backdrop-blur-sm">
                    <div className="bg-white rounded-2xl w-full max-w-md max-h-[95vh] flex flex-col shadow-2xl animate-fade-in">
                        <div className="p-5 border-b border-slate-100 flex justify-between items-start bg-slate-900 text-white rounded-t-2xl shrink-0">
                            <div>
                                <span className="text-[10px] font-mono bg-slate-800 text-yellow-400 px-2 py-0.5 rounded">CÓD: #{product.code}</span>
                                <h3 className="text-xl font-bold mt-2 leading-tight">{product.name}</h3>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-800 rounded-full text-slate-300 transition-colors"><X size={20} /></button>
                        </div>

                        <div className="flex border-b border-slate-100 shrink-0 bg-slate-50">
                            <button onClick={() => setTab('info')} className={`flex-1 py-3 text-sm font-bold border-b-2 transition-colors ${tab === 'info' ? 'border-yellow-500 text-slate-800' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>Detalhes</button>
                            <button onClick={() => setTab('history')} className={`flex-1 py-3 text-sm font-bold border-b-2 transition-colors ${tab === 'history' ? 'border-yellow-500 text-slate-800' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>Histórico</button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar">
                            {tab === 'info' && (
                                <div className="space-y-4 animate-fade-in">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <p className="text-[10px] uppercase font-bold text-slate-400 mb-1">Custo Médio</p>
                                            <p className="font-bold text-slate-800 text-lg">{formatCurrency(product.costPrice)}</p>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <p className="text-[10px] uppercase font-bold text-slate-400 mb-1">Estoque</p>
                                            <p className={`font-bold text-lg ${product.quantity <= 0 ? 'text-red-500' : 'text-slate-800'}`}>{product.quantity} un.</p>
                                        </div>
                                    </div>

                                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-2">
                                            <p className="text-[10px] uppercase font-bold text-slate-400">Preço de Venda</p>
                                            {isPromoActive && <span className="bg-purple-100 text-purple-700 text-[10px] px-2 py-0.5 rounded-full font-bold uppercase">Promoção Ativa</span>}
                                        </div>
                                        {isPromoActive ? (
                                            <div className="flex items-end gap-3">
                                                <p className="text-sm font-bold text-slate-400 line-through">{formatCurrency(product.salePrice)}</p>
                                                <p className="text-2xl font-bold text-purple-600">{formatCurrency(product.promoPrice)}</p>
                                            </div>
                                        ) : (
                                            <p className="text-2xl font-bold text-slate-800">{formatCurrency(product.salePrice)}</p>
                                        )}
                                    </div>

                                    {product.description && (
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                            <p className="text-[10px] uppercase font-bold text-slate-400 mb-1">Descrição</p>
                                            <p className="text-sm text-slate-600 whitespace-pre-wrap">{product.description}</p>
                                        </div>
                                    )}

                }

                const newMovement = {
                    id: Date.now().toString(),
                    type: movType,
                    quantity: movQty,
                    unitCost: isEntry && movType === 'compra' ? movCost : 0,
                    date: new Date().toISOString(),
                    previousQty: currentQty,
                    newQty: newQty,
                    notes: movementInfo.notes || ''
                };

                const updatedMovements = p.movements ? [...p.movements, newMovement] : [newMovement];

                await updateDoc(productRef, {
                    quantity: newQty,
                    costPrice: newCost,
                    movements: updatedMovements
                });

                setStockMovementData({ open: false, data: null });
                setProductDetailsData({ open: true, data: { ...p, quantity: newQty, costPrice: newCost, movements: updatedMovements }});
            };

            const handleSaveCustomer = async (data) => {
                if (customerModalData.data) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'customers', customerModalData.data.id), data);
                else await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'customers'), { ...data, createdAt: serverTimestamp() });
                setCustomerModalData({ open: false, data: null });
            };

            const confirmDelete = async () => {
                const { type, id } = deleteModal;
                const col = type === 'customer' ? 'customers' : 'products';
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, col, id));
                setDeleteModal({ open: false, type: null, id: null });
                if (type === 'product' && productDetailsData.data?.id === id) {
                    setProductDetailsData({ open: false, data: null });
                }
            };

            const requestDelete = (type, id) => {
                setDeleteModal({ open: true, type, id });
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-20 font-sans text-slate-800">
                    <header className="bg-slate-900 text-white p-4 lg:p-6 rounded-b-3xl shadow-lg sticky top-0 z-40 w-full">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-center mb-4">
                                <div className="flex items-center gap-3">
                                    <div className="bg-yellow-500 p-2 rounded-xl shadow-lg shadow-yellow-500/20"><LayoutGrid className="text-slate-900" size={24} /></div>
                                    <div>
                                        <h1 className="text-xl lg:text-2xl font-bold bg-gradient-to-r from-yellow-200 to-yellow-500 bg-clip-text text-transparent">Gestor Integrado</h1>
                                        <p className="text-xs text-slate-400">Ambiente de Cadastros</p>
                                    </div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={onLogout} className="bg-slate-800 p-2 rounded-full text-red-400 border border-slate-700 hover:bg-slate-700 transition-colors"><LogOut size={20}/></button>
                                    <button onClick={() => view === 'products' ? setProductModalData({open: true, data: null}) : setCustomerModalData({open: true, data: null})} className="bg-yellow-500 hover:bg-yellow-400 text-slate-900 p-2 rounded-full shadow-lg transition-transform active:scale-95 ml-2">
                                        <PlusCircle size={20} />
                                    </button>
                                </div>
                            </div>
                            <div className="flex space-x-1 overflow-x-auto no-scrollbar justify-start lg:justify-center">
                                <button onClick={() => setView('products')} className={`pb-2 px-3 lg:px-6 whitespace-nowrap font-medium text-sm lg:text-base transition-colors ${view === 'products' ? 'text-yellow-400 border-b-2 border-yellow-400' : 'text-slate-400 hover:text-white'}`}>Catálogo</button>
                                <button onClick={() => setView('customers')} className={`pb-2 px-3 lg:px-6 whitespace-nowrap font-medium text-sm lg:text-base transition-colors ${view === 'customers' ? 'text-yellow-400 border-b-2 border-yellow-400' : 'text-slate-400 hover:text-white'}`}>Clientes</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto p-4 mt-2 space-y-4">
                        {view === 'products' && (
                            <div className="animate-fade-in">
                                <div className="flex gap-2 mb-4">
                                    <div className="relative flex-1">
                                        <Search size={18} className="absolute left-3 top-3.5 text-slate-400" />
                                        <input className="w-full p-3 pl-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none shadow-sm" placeholder="Buscar produto..." value={productSearch} onChange={e => setProductSearch(e.target.value.toUpperCase())} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    {paginatedProducts.map(p => {
                                        const isPromoActive = p.isPromo && getBrazilDateString() >= p.promoStart && getBrazilDateString() <= p.promoEnd;
                                        return (
                                            <div key={p.id} onClick={() => setProductDetailsData({open: true, data: p})} className="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden flex flex-col hover:shadow-md hover:border-yellow-300 transition-all cursor-pointer">
                                                <div className="p-4 flex-1">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-xs font-mono bg-slate-100 text-slate-500 px-2 py-1 rounded">#{p.code}</span>
                                                        {isPromoActive && <span className="bg-purple-100 text-purple-700 text-[10px] px-2 py-1 rounded-full font-bold uppercase flex items-center gap-1"><Tag size={10}/> Promo</span>}
                                                    </div>
                                                    <h3 className="font-bold text-slate-800 leading-tight mb-1">{p.name}</h3>
                                                    <div className="flex justify-between items-end mt-4">
                                                        <div>
                                                            <p className="text-[10px] text-slate-400 uppercase font-bold">Venda</p>
                                                            {isPromoActive ? (
                                                                <div className="flex flex-col"><span className="text-xs text-slate-400 line-through">{formatCurrency(p.salePrice)}</span><span className="text-lg font-bold text-purple-600">{formatCurrency(p.promoPrice)}</span></div>
                                                            ) : <span className="text-lg font-bold text-slate-800">{formatCurrency(p.salePrice)}</span>}
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="text-[10px] text-slate-400 uppercase font-bold">Estoque</p>
                                                            <span className={`font-bold ${p.quantity <= 0 ? 'text-red-500' : 'text-slate-700'}`}>{p.quantity} un.</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {filteredProducts.length === 0 && <p className="col-span-full text-center text-slate-400 py-10">Nenhum produto encontrado.</p>}
                                </div>
                                <Pagination totalItems={filteredProducts.length} itemsPerPage={ITEMS_PER_PAGE} currentPage={productPage} onPageChange={setProductPage} />
                            </div>
                        )}

                        {view === 'customers' && (
                            <div className="animate-fade-in">
                                <div className="flex gap-2 mb-4">
                                    <div className="relative flex-1">
                                        <Search size={18} className="absolute left-3 top-3.5 text-slate-400" />
                                        <input className="w-full p-3 pl-10 border border-slate-200 rounded-xl focus:ring-2 focus:ring-yellow-500 outline-none shadow-sm" placeholder="Buscar cliente ou documento..." value={customerSearch} onChange={e => setCustomerSearch(e.target.value.toUpperCase())} />
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {paginatedCustomers.map(c => (
                                        <div key={c.id} className="bg-white p-4 rounded-xl border border-slate-100 flex flex-col shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex-1">
                                                <h3 className="font-bold text-slate-800 mb-1">{c.name}</h3>
                                                <div className="space-y-1 mt-2 text-sm text-slate-600">
                                                    {c.phone && <p className="flex items-center gap-2"><Phone size={14} className="text-slate-400"/> {c.phone}</p>}
                                                    {c.document && <p className="flex items-center gap-2"><FileText size={14} className="text-slate-400"/> {c.document}</p>}
                                                    {c.cityState && <p className="flex items-center gap-2"><MapPin size={14} className="text-slate-400"/> {c.cityState}</p>}
                                                </div>
                                            </div>
                                            <div className="flex gap-2 mt-4 pt-3 border-t border-slate-100">
                                                <button onClick={() => setCustomerModalData({open: true, data: c})} className="flex-1 text-slate-400 hover:text-yellow-600 p-2 flex justify-center items-center rounded-lg hover:bg-slate-50 transition-colors"><Edit2 size={18} /></button>
                                                <button onClick={() => requestDelete('customer', c.id)} className="flex-1 text-slate-400 hover:text-red-500 p-2 flex justify-center items-center rounded-lg hover:bg-red-50 transition-colors"><Trash2 size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {filteredCustomers.length === 0 && <p className="col-span-full text-center text-slate-400 py-10">Nenhum cliente encontrado.</p>}
                                </div>
                                <Pagination totalItems={filteredCustomers.length} itemsPerPage={ITEMS_PER_PAGE} currentPage={customerPage} onPageChange={setCustomerPage} />
                            </div>
                        )}
                    </main>

                    {/* Modais */}
                    <ProductModal 
                        isOpen={productModalData.open} 
                        onClose={() => setProductModalData({open: false, data: null})} 
                        onSave={handleSaveProduct} 
                        initialData={productModalData.data} 
                        lastCode={products.length > 0 ? String(products.reduce((max, p) => Math.max(max, parseInt(p.code || '0', 10) || 0), 0)).padStart(6, '0') : null} 
                    />
                    
                    <ProductDetailsModal 
                        isOpen={productDetailsData.open} 
                        onClose={() => setProductDetailsData({open: false, data: null})} 
                        product={productDetailsData.data} 
                        salesHistory={sales}
                        onEdit={(p) => setProductModalData({open: true, data: p})}
                        onMovementRequest={(p) => setStockMovementData({open: true, data: p})}
                        onDeleteRequest={requestDelete}
                    />

                    <StockMovementModal 
                        isOpen={stockMovementData.open} 
                        onClose={() => setStockMovementData({open: false, data: null})} 
                        product={stockMovementData.data} 
                        onSave={handleStockMovement} 
                    />

                    <CustomerFormModal 
                        isOpen={customerModalData.open} 
                        onClose={() => setCustomerModalData({open: false, data: null})} 
                        onSave={handleSaveCustomer} 
                        initialData={customerModalData.data} 
                    />

                    <ConfirmModal 
                        isOpen={deleteModal.open} 
                        title="Excluir Permanentemente?" 
                        message="O registro será apagado do sistema sem possibilidade de recuperação." 
                        onClose={() => setDeleteModal({ open: false, type: null, id: null })} 
                        onConfirm={confirmDelete} 
                    />
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);
            const [accessDenied, setAccessDenied] = useState(false);

            useEffect(() => {
                const unsub = onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        const snap = await getDoc(doc(db, 'artifacts', APP_ID, 'users', u.uid, 'profile', 'info'));
                        if (snap.exists()) {
                            const data = snap.data();
                            if (data.approved) {
                                setUser(u);
                                setUserProfile(data);
                            } else {
                                setAccessDenied(true);
                                await signOut(auth);
                            }
                        } else {
                            await signOut(auth);
                        }
                    } else {
                        setUser(null);
                        setUserProfile(null);
                    }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-slate-50">Carregando Sistema...</div>;
            
            if (accessDenied) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-red-50 p-6 text-center">
                    <Lock size={48} className="text-red-500 mb-4" />
                    <h1 className="text-2xl font-bold text-red-800 mb-2">Acesso Negado</h1>
                    <p className="text-red-600 mb-6">Seu cadastro não possui aprovação para acessar este módulo.</p>
                    <button onClick={() => { setAccessDenied(false); window.location.reload(); }} className="px-6 py-3 bg-red-600 text-white font-bold rounded-xl">Voltar</button>
                </div>
            );

            if (!user) return <AuthScreen />;
            return <CatalogApp user={user} userProfile={userProfile} onLogout={() => signOut(auth)} />;
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <!-- Registro do Service Worker (PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registrado com sucesso:', reg))
                    .catch(err => console.error('Erro ao registrar Service Worker:', err));
            });
        }
    </script>
</body>
</html>
